<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LA ROACHES THINGS & STUFF</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:url("IMG_5855.jpeg") center/cover fixed;
}

/* dark cinematic overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
z-index:-1;
}

/* movie logo */
.logo{
margin-top:40px;
width:320px;
}

/* shop */
.shop{
position:fixed;
top:20px;
right:20px;
cursor:pointer;
}
.shop img{
width:85px;
border-radius:12px;
transition:.3s;
}
.shop:hover{
transform:scale(1.1);
}

/* trailer */
video{
width:75%;
border-radius:15px;
margin:20px;
}

/* hidden code */
#codeBox{
opacity:.2;
transition:.3s;
}
#codeBox:hover{
opacity:1;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#ffd900;
font-weight:bold;
cursor:pointer;
}

/* game */
#gameArea{
display:none;
margin-top:20px;
}

canvas{
background:#6ec6ff;
border-radius:12px;
}

</style>
</head>

<body>

<img class="logo"
src="A5B3C3D7-8E1C-461A-9BDA-0AA411E4BF28.png">

<div class="shop">
<img src="20733571-CD68-401E-BB67-C9D9A9E5D7FF.png">
</div>

<h2>Official Trailer</h2>

<video controls>
<source src="copy_B21255D0-64AD-4AF8-9A6B-C4885442C65E.mov">
</video>

<!-- SECRET ARG -->
<div id="codeBox">
<input id="code" placeholder="...">
<button onclick="unlock()">OK</button>
</div>

<div id="result"></div>

<!-- GAME -->
<div id="gameArea">
<h2>Mini Game</h2>
<button onclick="startGame()">START GAME</button>
<br><br>
<canvas id="game" width="800" height="250"></canvas>
</div>

<script>

/* SECRET SYSTEM */

function unlock(){

let code=document
.getElementById("code")
.value.toLowerCase();

let r=document.getElementById("result");

r.innerHTML="";

if(code==="minecraft"){
r.innerHTML=
"<img width=350 src='IMG_5855.jpeg'>";
}

else if(code==="mario"){
document.getElementById("gameArea")
.style.display="block";
}

else if(code==="sonic"){
speed=10;
r.innerHTML="Speed Mode Enabled";
}

else if(code==="animal crossing"){
document.body.style.filter=
"hue-rotate(90deg)";
}

else{
r.innerHTML="...";
}

}

/* GAME SYSTEM */

const canvas=
document.getElementById("game");
const ctx=
canvas.getContext("2d");

let running=false;

let player={
x:60,
y:190,
w:40,
h:40,
vy:0,
jump:false
};

let gravity=.7;
let speed=5;
let obstacles=[];

document.addEventListener("keydown",e=>{
if(e.code==="Space" && running){
if(!player.jump){
player.vy=-12;
player.jump=true;
}
}
});

function startGame(){
running=true;
obstacles=[];
loop();
}

/* spawn pipes */
function spawn(){
if(running){
obstacles.push({
x:800,
y:200,
w:30,
h:40
});
}
}

setInterval(spawn,2000);

function loop(){

if(!running)return;

ctx.clearRect(0,0,800,250);

/* ground */
ctx.fillStyle="#3aa655";
ctx.fillRect(0,230,800,20);

/* player (Mario-like color) */
ctx.fillStyle="red";
ctx.fillRect(
player.x,
player.y,
player.w,
player.h);

/* physics */
player.vy+=gravity;
player.y+=player.vy;

if(player.y>=190){
player.y=190;
player.jump=false;
}

/* obstacles */
ctx.fillStyle="green";

for(let o of obstacles){

o.x-=speed;

ctx.fillRect(o.x,o.y,o.w,o.h);

if(
player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y<o.y+o.h &&
player.y+player.h>o.y
){
running=false;
alert("Game Over");
}
}

requestAnimationFrame(loop);
}

</script>

</body>
</html>
