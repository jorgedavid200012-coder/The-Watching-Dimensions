<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LA ROACHES THINGS & STUFF</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6dd5ed,#2193b0);
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */
header{
padding:30px;
animation:fade 2s;
}

header img{
width:300px;
}

/* SHOP BUTTON */
.shop{
position:fixed;
top:20px;
right:20px;
cursor:pointer;
transition:.3s;
}
.shop img{
width:90px;
border-radius:10px;
}
.shop:hover{
transform:scale(1.1);
}

/* TRAILER */
video{
width:80%;
border-radius:15px;
margin:20px;
box-shadow:0 0 20px black;
}

/* SECRET INPUT */
input{
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ffcc00;
font-weight:bold;
cursor:pointer;
}

/* GAME */
canvas{
background:#87CEEB;
border-radius:15px;
margin-top:20px;
}

/* animation */
@keyframes fade{
from{opacity:0;transform:translateY(-30px)}
to{opacity:1;}
}
</style>
</head>

<body>

<header>
<img src="A5B3C3D7-8E1C-461A-9BDA-0AA411E4BF28.png">
<h1>LA ROACHES THINGS & STUFF</h1>
</header>

<!-- SHOP -->
<div class="shop" onclick="alert('Fake Shop Coming Soon!')">
<img src="20733571-CD68-401E-BB67-C9D9A9E5D7FF.png">
</div>

<h2>Official Trailer</h2>

<video controls>
<source src="copy_B21255D0-64AD-4AF8-9A6B-C4885442C65E.mov">
</video>

<h2>Movie Shot</h2>
<img src="IMG_5855.jpeg" width="70%" style="border-radius:15px">

<h2>Secret Code</h2>

<input id="code" placeholder="Enter code...">
<button onclick="unlock()">ENTER</button>

<div id="result"></div>

<h2>MiniGame</h2>
<canvas id="game" width="800" height="250"></canvas>

<script>

/* SECRET SYSTEM */
function unlock(){
let code=document.getElementById("code").value.toLowerCase();
let r=document.getElementById("result");

if(code==="mario"){
r.innerHTML="🍄 MARIO MODE ACTIVATED";
speed=6;
}
else if(code==="sonic"){
r.innerHTML="💨 SONIC SPEED!";
speed=12;
}
else if(code==="animal crossing"){
document.body.style.background=
"linear-gradient(#7ed957,#3cb371)";
r.innerHTML="🌿 Animal Crossing Theme";
}
else if(code==="minecraft"){
r.innerHTML="<img width=300 src='IMG_5855.jpeg'>";
}
else if(code==="blox"){
r.innerHTML="🟥 BLOX MODE";
}
else{
r.innerHTML="❌ Unknown Code";
}
}

/* REAL RUNNER GAME */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player={
x:50,
y:200,
w:30,
h:30,
vy:0,
jump:false
};

let gravity=0.7;
let speed=5;
let obstacles=[];

document.addEventListener("keydown",()=>{
if(!player.jump){
player.vy=-12;
player.jump=true;
}
});

function spawn(){
obstacles.push({
x:800,
y:210,
w:20,
h:40
});
}

setInterval(spawn,2000);

function update(){

ctx.clearRect(0,0,800,250);

/* player */
player.vy+=gravity;
player.y+=player.vy;

if(player.y>=200){
player.y=200;
player.jump=false;
}

ctx.fillStyle="red";
ctx.fillRect(player.x,player.y,
player.w,player.h);

/* obstacles */
ctx.fillStyle="green";

for(let i=0;i<obstacles.length;i++){
let o=obstacles[i];
o.x-=speed;

ctx.fillRect(o.x,o.y,o.w,o.h);

/* collision */
if(player.x<o.x+o.w &&
player.x+player.w>o.x &&
player.y<o.y+o.h &&
player.y+player.h>o.y){

alert("Game Over");
location.reload();
}
}

requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
