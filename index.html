<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTRA ARG</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Courier New;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at center,
#111 0%,
black 70%);
z-index:-1;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

/* LOGOS */
.movieLogo{
width:260px;
filter:drop-shadow(0 0 20px white);
}

.shopLogo{
width:130px;
opacity:.85;
}

/* HERO SECTION */
.hero{
text-align:center;
margin-top:40px;
}

.hero h1{
font-size:60px;
letter-spacing:6px;
text-shadow:0 0 20px red;
}

/* TRAILER */
.trailer{
display:flex;
justify-content:center;
margin-top:40px;
}

video{
width:70%;
border-radius:10px;
box-shadow:0 0 40px red;
}

/* TERMINAL */
.panel{
width:70%;
margin:60px auto;
padding:25px;
border:1px solid white;
background:#050505;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

input{
background:black;
color:white;
border:1px solid white;
padding:12px;
font-size:18px;
width:60%;
}

button{
padding:12px 20px;
background:white;
border:none;
cursor:pointer;
}

/* SECRET AREA */
#secretArea{
margin-top:30px;
}

/* GLITCH */
@keyframes glitch{
0%{transform:translate(2px);}
50%{transform:translate(-2px);}
100%{transform:translate(2px);}
}

.glitch{
animation:glitch .15s infinite;
}

</style>
</head>

<body>

<div class="topbar">
<img src="A5B3C3D7-8E1C-461A-9BDA-0AA411E4BF28.png"
class="movieLogo">

<img src="20733571-CD68-401E-BB67-C9D9A9E5D7FF.png"
class="shopLogo">
</div>

<div class="hero">
<h1 id="title">ULTRA ARG</h1>
<p>SIGNAL DETECTED</p>
</div>

<div class="trailer">
<video controls>
<source src="copy_B21255D0-64AD-4AF8-9A6B-C4885442C65E.mov">
</video>
</div>

<div class="panel">

<h2>ACCESS TERMINAL</h2>

<input id="codeInput"
placeholder="ENTER CODE">

<button onclick="checkCode()">EXECUTE</button>

<div id="secretArea"></div>

</div>

<script>

/* RANDOM GLITCH */
setInterval(()=>{
if(Math.random()<0.2){
document.body.classList.add("glitch");
setTimeout(()=>{
document.body.classList.remove("glitch");
},150);
}
},4000);

/* TITLE CHANGE */
setTimeout(()=>{
document.getElementById("title")
innerText="REALITY BREACH";
},8000);

function checkCode(){

let code=
document.getElementById("codeInput")
.value.toLowerCase();

let area=
document.getElementById("secretArea");

if(code==="minecraft"){
area.innerHTML=
`<h3>FILE RECOVERED</h3>
<img src="IMG_5855.jpeg" width="100%">`;
}

else if(code==="mario"){
area.innerHTML="<h3>Mario Simulation Loaded</h3>";
}

else if(code==="animal crossing"){
area.innerHTML="<h3>Resident Access Granted</h3>";
}

else if(code==="sonic"){
area.innerHTML="<h3>Speed Protocol Enabled</h3>";
}

else if(code==="ultra"){
area.innerHTML=
"<h3>ADMIN ACCESS CONFIRMED</h3>";
}

else{
area.innerHTML="ACCESS DENIED";
}

}

</script>

</body>
</html>
