<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ULTRA ARG</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow-x:hidden;
}

/* MOVIE LOGO */
.movieLogo{
width:300px;
margin-top:30px;
}

/* SHOP LOGO */
.shopLogo{
width:180px;
position:fixed;
top:20px;
right:20px;
}

/* TRAILER */
video{
width:80%;
margin-top:30px;
border:3px solid white;
}

/* SECRET INPUT */
input{
padding:12px;
font-size:18px;
margin-top:40px;
background:black;
color:white;
border:2px solid white;
}

button{
padding:12px 20px;
font-size:18px;
background:white;
border:none;
cursor:pointer;
}

/* SECRET AREA */
#secretArea{
margin-top:40px;
display:none;
}

/* MINIGAME BOX */
.game{
margin-top:20px;
padding:20px;
border:2px solid white;
}

/* DRAMATIC EFFECT */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle,
transparent 60%,
rgba(255,0,0,0.2));
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{opacity:.3;}
50%{opacity:.7;}
100%{opacity:.3;}
}

</style>
</head>

<body>

<!-- MOVIE LOGO -->
<img src="A5B3C3D7-8E1C-461A-9BDA-0AA411E4BF28.png"
class="movieLogo">

<!-- SHOP LOGO -->
<img src="shop.png" class="shopLogo">

<h1>ULTRA ARG</h1>
<p>Reality Is Breaking...</p>

<!-- TRAILER -->
<video controls>
<source src="copy_B21255D0-64AD-4AF8-9A6B-C4885442C65E.mov">
</video>

<h2>ENTER ACCESS CODE</h2>

<input id="codeInput" placeholder="ENTER CODE">
<button onclick="checkCode()">UNLOCK</button>

<div id="secretArea"></div>

<script>

function checkCode(){

let code =
document.getElementById("codeInput")
.value.toLowerCase();

let area =
document.getElementById("secretArea");

area.style.display="block";

/* MARIO GAME */
if(code==="mario"){
area.innerHTML=
`
<div class="game">
<h2>Mario Mini Game</h2>
<p>🍄 Jump Challenge Activated</p>
<button onclick="alert('You jumped!')">
JUMP
</button>
</div>
`;
}

/* ANIMAL CROSSING */
else if(code==="animal crossing"){
area.innerHTML=
`
<div class="game">
<h2>Animal Crossing Mode</h2>
<p>🌿 Collect Bells!</p>
<button onclick="alert('+100 Bells')">
COLLECT
</button>
</div>
`;
}

/* SONIC */
else if(code==="sonic"){
area.innerHTML=
`
<div class="game">
<h2>Sonic Speed Test</h2>
<button onclick="alert('FAST!!!')">
RUN
</button>
</div>
`;
}

/* BLOX */
else if(code==="blox"){
area.innerHTML=
`
<div class="game">
<h2>Blox Simulation</h2>
<p>You entered the block world.</p>
</div>
`;
}

/* MINECRAFT = MOVIE SHOT */
else if(code==="minecraft"){
area.innerHTML=
`
<div class="game">
<h2>SECRET FILE UNLOCKED</h2>
<img src="IMG_5855.jpeg"
width="80%">
</div>
`;
}

else{
area.innerHTML=
"<p>ACCESS DENIED</p>";
}

}

</script>

</body>
</html>
